name: 🚀 Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: 🎯 Deploy to VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
        run: |
          sshpass -p "$VPS_PASSWORD" ssh -o StrictHostKeyChecking=no root@$VPS_HOST << 'EOF'
          set -e
          echo "📂 Navigating to app directory..."
          cd /app/mareservation || { echo "❌ Directory not found, cloning..."; mkdir -p /app/mareservation; git clone https://github.com/declared-as-ala/mareservation.git /app/mareservation; cd /app/mareservation; }

          echo "📥 Fetching latest code (hard reset to origin/main — robust against force-pushed/rewritten history)..."
          git fetch origin main
          git reset --hard FETCH_HEAD

          echo "⚙️ Copying environment file..."
          if [ -f ~/mareservation/.env ]; then
            cp -f ~/mareservation/.env .env
            echo "✅ Synchronized .env from ~/mareservation/.env"
          elif [ -f /root/mareservation/.env ]; then
            cp -f /root/mareservation/.env .env
            echo "✅ Synchronized .env from /root/mareservation/.env"
          elif [ ! -f .env ]; then
            cp .env.example .env
            echo "⚠️ Created .env from template - PLEASE UPDATE WITH YOUR SECRETS!"
          fi

          echo "🌐 Setting NEXT_PUBLIC_API_URL and FRONTEND_URL to VPS public IP (forced)..."
          VPS_IP=$(curl -s --max-time 5 https://api.ipify.org 2>/dev/null || hostname -I | awk '{print $1}')
          echo "   Detected VPS IP: ${VPS_IP}"
          # Force-set NEXT_PUBLIC_API_URL
          if grep -q "^NEXT_PUBLIC_API_URL=" .env; then
            sed -i "s|^NEXT_PUBLIC_API_URL=.*|NEXT_PUBLIC_API_URL=http://${VPS_IP}:5001|" .env
          else
            echo "NEXT_PUBLIC_API_URL=http://${VPS_IP}:5001" >> .env
          fi
          echo "   ✅ NEXT_PUBLIC_API_URL=http://${VPS_IP}:5001"

          # Force-set FRONTEND_URL
          if grep -q "^FRONTEND_URL=" .env; then
            sed -i "s|^FRONTEND_URL=.*|FRONTEND_URL=http://${VPS_IP}:3000|" .env
          else
            echo "FRONTEND_URL=http://${VPS_IP}:3000" >> .env
          fi
          echo "   ✅ FRONTEND_URL=http://${VPS_IP}:3000"

          echo "🏗️ Building Docker images..."
          docker compose build

          echo "🔍 Checking what is listening on port 5001..."
          ss -tulpn | grep 5001 || true

          echo "🔫 Killing any process using port 5001..."
          fuser -k 5001/tcp 2>/dev/null || true

          echo "🧹 Cleaning up conflicting containers..."
          CONTAINERS=$(docker ps -a -q --filter name=mareservation)
          if [ -n "$CONTAINERS" ]; then
            echo "Removing existing/conflicting containers..."
            docker rm -f $CONTAINERS
          fi

          echo "🚀 Starting services..."
          docker compose up -d

          echo "⏳ Waiting for services to be healthy..."
          sleep 10

          echo "🌱 Running database seeds conditionally (only if database is empty)..."
          docker compose exec -T backend node -e "
            import('mongoose').then(async (m) => {
              const uri = process.env.MONGO_URI || 'mongodb://admin:changeme@mongodb:27017/mareservation?authSource=admin';
              await m.connect(uri);
              const count = await m.connection.db.collection('venues').countDocuments();
              if (count === 0) {
                console.log('📂 Database categories collection is empty. Seeding database...');
                const { execSync } = await import('child_process');
                execSync('npm run seed', { stdio: 'inherit' });
                execSync('npm run seed:dining', { stdio: 'inherit' });
                execSync('npm run seed:coworking', { stdio: 'inherit' });
                execSync('npm run seed:menu', { stdio: 'inherit' });
                execSync('npx tsx src/scripts/seed-user.ts', { stdio: 'inherit' });
                execSync('npx tsx src/scripts/seed-event-media.ts', { stdio: 'inherit' });
                console.log('✅ Seeding complete!');
              } else {
                console.log('📂 Database already populated. Skipping seeding.');
              }
              process.exit(0);
            }).catch(err => {
              console.error('❌ Seeding check failed:', err);
              process.exit(0); // Exit gracefully so deployment doesn't fail
            });
          "

          echo "🆕 Running fresh catalog seed (DESTRUCTIVE — wipes venues+events+rooms then reseeds 7 fixtures)..."
          docker compose exec -T backend npm run seed:fresh-catalog || echo "⚠️  Fresh catalog seed failed but continuing deploy."

          echo "📊 Docker services status:"
          docker compose ps

          echo "✅ Deployment complete!"
          EOF

      - name: 📧 Notify on failure
        if: failure()
        run: echo "❌ Deployment failed. Check logs above."

      - name: ✅ Notify on success
        if: success()
        run: echo "✅ Deployment succeeded! Services running on VPS."
