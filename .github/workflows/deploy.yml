name: 🚀 Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔑 Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: 🎯 Deploy to VPS
        run: |
          ssh -i ~/.ssh/id_rsa root@${{ secrets.VPS_HOST }} << 'EOF'
          set -e
          echo "📂 Navigating to app directory..."
          cd /app/mareservation

          echo "📥 Pulling latest code..."
          git pull origin main

          echo "⚙️ Copying environment file..."
          if [ ! -f .env ]; then
            cp .env.example .env
            echo "⚠️ Created .env from template - PLEASE UPDATE WITH YOUR SECRETS!"
          fi

          echo "🏗️ Building Docker images..."
          docker-compose build

          echo "🚀 Starting services..."
          docker-compose up -d

          echo "⏳ Waiting for services to be healthy..."
          sleep 10

          echo "✅ Verifying backend..."
          docker-compose exec -T backend npm run build || true

          echo "✅ Checking MongoDB..."
          docker-compose exec -T mongodb mongosh -u admin -p changeme --authenticationDatabase admin --eval "db.adminCommand('ping')" || true

          echo "📊 Docker services status:"
          docker-compose ps

          echo "✅ Deployment complete!"
          EOF

      - name: 📧 Notify on failure
        if: failure()
        run: echo "❌ Deployment failed. Check logs above."

      - name: ✅ Notify on success
        if: success()
        run: echo "✅ Deployment succeeded! Services running on VPS."
