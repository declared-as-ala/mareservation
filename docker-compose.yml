services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: matable-backend
    restart: unless-stopped
    ports:
      - "5001:3001"
    env_file:
      - ./backend/.env
    environment:
      PORT: 3001
      NODE_ENV: production
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
    networks:
      - matable-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: matable-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:5001}
    depends_on:
      - backend
    networks:
      - matable-network

networks:
  matable-network:
    driver: bridge
