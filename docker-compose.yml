version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: mareservation-db
    restart: always
    ports:
      - '127.0.0.1:27017:27017'
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-changeme}
      MONGO_INITDB_DATABASE: mareservation
    volumes:
      - mongodb_data:/data/db
      - ./backend/scripts/seed.js:/docker-entrypoint-initdb.d/01-seed.js
    networks:
      - mareservation-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test -u ${MONGO_USER:-admin} -p ${MONGO_PASSWORD:-changeme}
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: mareservation-backend
    restart: always
    ports:
      - '5000:5000'
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: 5000
      MONGO_URI: mongodb://${MONGO_USER:-admin}:${MONGO_PASSWORD:-changeme}@mongodb:27017/mareservation?authSource=admin
      MONGO_USER: ${MONGO_USER:-admin}
      MONGO_PASSWORD: ${MONGO_PASSWORD:-changeme}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      REFRESH_SECRET: ${REFRESH_SECRET:-your-super-secret-refresh-key-change-in-production}
      ACCESS_TOKEN_EXPIRY: ${ACCESS_TOKEN_EXPIRY:-15m}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      KONNECT_API_URL: ${KONNECT_API_URL:-https://api.konnect.tn}
      KONNECT_API_KEY: ${KONNECT_API_KEY:-}
      KONNECT_SECRET_KEY: ${KONNECT_SECRET_KEY:-}
      KONNECT_ENTITY_ID: ${KONNECT_ENTITY_ID:-}
      UPLOAD_MAX_FILE_SIZE_MB: ${UPLOAD_MAX_FILE_SIZE_MB:-50}
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - mareservation-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:5000/api/v1}
    container_name: mareservation-frontend
    restart: always
    ports:
      - '3000:3000'
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:5000/api/v1}
    depends_on:
      - backend
    networks:
      - mareservation-network

volumes:
  mongodb_data:
    driver: local

networks:
  mareservation-network:
    driver: bridge
